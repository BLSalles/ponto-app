services:
  - type: web
    name: ponto-app
    env: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GESTOR_EMAIL
        value: gestor@empresa.com
      - key: GESTOR_SENHA
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ponto-db
          property: connectionString

databases:
  - name: ponto-db
    plan: free
